<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Օֆիս · Կառավարում</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@400;500;600;700&family=Noto+Serif+Armenian:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f3eee4; --sidebar:#1c3b34; --sidebarText:#dfe7df; --sidebarMuted:#8fa79e;
    --card:#fdfbf6; --ink:#2a2722; --muted:#8c8474; --border:#e4dccb;
    --accent:#b5572f; --accentSoft:#f3e3d7; --signed:#3a7d52; --signedSoft:#e3efe6;
    --unsigned:#c0492f; --unsignedSoft:#f7e2dc; --gold:#c2972f;
    --serif:'Noto Serif Armenian',Georgia,serif; --sans:'Noto Sans Armenian',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fade{animation:fadeUp .4s ease both}
  input,select,textarea,button{font-family:inherit;font-size:14px}
  input,select,textarea{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--ink)}
  textarea{resize:vertical}
  input:focus,select:focus,textarea:focus{outline:2px solid #b5572f33;border-color:var(--accent)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

  aside{width:248px;background:var(--sidebar);color:var(--sidebarText);padding:26px 16px;display:flex;flex-direction:column;flex-shrink:0;min-height:100vh}
  .brand{padding:0 8px 22px}
  .brand h1{font-family:var(--serif);font-size:22px;font-weight:800}
  .brand p{font-size:12.5px;color:var(--sidebarMuted);margin-top:4px}
  .divider{height:1px;background:#ffffff1a;margin:0 6px 16px}
  .navbtn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:transparent;color:var(--sidebarText);padding:11px 13px;border-radius:10px;cursor:pointer;font-weight:500;margin-bottom:4px;border-left:3px solid transparent;transition:background .15s}
  .navbtn:hover{background:#ffffff0d}
  .navbtn.active{background:#ffffff14;color:#fff;font-weight:600;border-left:3px solid var(--gold)}
  .navbtn .ic{font-size:16px}

  main{flex:1;padding:32px 40px;overflow-y:auto;max-height:100vh}
  .head{margin-bottom:24px}
  .head .bar{width:38px;height:4px;background:var(--gold);border-radius:4px;margin-bottom:12px}
  .head h2{font-family:var(--serif);font-size:30px;font-weight:800}
  .head p{color:var(--muted);margin-top:6px;font-size:14.5px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 1px 2px #0000000a}
  .stitle{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .grid-acts{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
  .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label.f{display:block}
  label.f span{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .stats{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .stat{flex:1;min-width:150px;padding:16px 20px}
  .stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
  .stat .val{font-family:var(--serif);font-size:30px;font-weight:800;margin-top:4px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:600;cursor:pointer}
  .btn.mt{margin-top:16px}
  .toggle{flex:1;padding:9px 6px;border-radius:9px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted)}
  .toggle.on-u{border-color:var(--unsigned);background:var(--unsigned);color:#fff}
  .toggle.on-s{border-color:var(--signed);background:var(--signed);color:#fff}
  .pill{font-weight:600;font-size:12.5px;padding:3px 11px;border-radius:20px;white-space:nowrap;display:inline-block}
  .pill.s{background:var(--signedSoft);color:var(--signed)}
  .pill.u{background:var(--unsignedSoft);color:var(--unsigned)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
  .del{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px}
  .del:hover{color:var(--unsigned)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:6px 10px;font-weight:600;color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.4px}
  td{padding:11px 10px;vertical-align:top;border-top:1px solid var(--border)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);font-size:14px;padding:10px 0}
  .notice{padding:16px;border-radius:14px;margin-bottom:20px;background:var(--accentSoft);border:1px solid #b5572f40;color:var(--accent)}
  details summary{cursor:pointer;font-size:13px;color:var(--accent);font-weight:600}
  .ph{text-align:center;padding:60px 24px}
  .ph .ic{font-size:46px;margin-bottom:14px}
  .ph h3{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px}
  .ph p{color:var(--muted);font-size:15px;max-width:460px;margin:0 auto;line-height:1.6}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{background:var(--accentSoft);color:var(--accent);font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:7px}
  .chip button{background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:0;font-weight:700}
  .filechip{background:var(--signedSoft);color:var(--signed);border:none;font-size:12px;font-weight:600;padding:5px 9px;border-radius:8px;cursor:pointer;margin:2px 3px 2px 0;display:inline-block}
  .filechip:hover{filter:brightness(.96)}
  .btn.alt{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .prow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);gap:10px}
  .pname{font-size:14.5px;font-weight:500}
  .psub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .gpill{font-size:11px;font-weight:600;color:var(--gold);background:#f6edd6;padding:1px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .toolbar select{width:auto}
  .saved{font-size:11px;color:var(--sidebarMuted);padding:4px 8px;text-align:center;margin-top:8px}
  @media(max-width:780px){
    body{flex-direction:column}
    aside{width:100%;min-height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;padding:14px}
    aside .brand,aside .divider{display:none}
    main{padding:20px}
    .grid2,.grid-acts,.formgrid{grid-template-columns:1fr}
    .navbtn{width:auto;margin-bottom:0}
  }
  #printArea{display:none}
  .svactions{display:flex;gap:8px;margin-top:10px}
  .svactions .btn{margin-top:0}
  .psheet{font-family:var(--sans);color:#000;max-width:520px;border:1.5px solid #000;border-radius:6px;padding:18px 20px}
  .psheet-h{font-family:var(--serif);font-size:20px;font-weight:800;text-align:center;letter-spacing:1px;margin-bottom:14px}
  .psheet-t{width:100%;border-collapse:collapse;font-size:14px}
  .psheet-t td{padding:7px 6px;border-bottom:1px solid #ccc;vertical-align:top}
  .psheet-t td.k{font-weight:700;width:130px;color:#333}
  .psheet-sign{display:flex;justify-content:space-between;margin-top:24px;font-size:14px}
  .psheet-sign .sline{color:#999}
  .actcard{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff;break-inside:avoid;page-break-inside:avoid}
  .embed-host{margin-top:2px}
  .subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .subtab{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--muted);font-weight:600;cursor:pointer;font-size:14px}
  .subtab.on{background:var(--sidebar);color:#fff;border-color:var(--sidebar)}
  .flbl{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .flbl input{padding:7px 9px}
  .mini{background:transparent;border:1px solid var(--border);border-radius:7px;padding:4px 8px;cursor:pointer;font-size:12px;margin-right:4px;color:var(--ink)}
  .mini:hover{border-color:var(--accent);color:var(--accent)}
  .mini.on{border-color:var(--accent);color:var(--accent);background:var(--accentSoft)}
  .attrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px}
  .attbtns{display:flex;gap:6px;flex-wrap:wrap}
  .att{padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);font-weight:600;cursor:pointer;font-size:12.5px}
  .att.on-p{background:var(--signed);color:#fff;border-color:var(--signed)}
  .att.on-a{background:var(--unsigned);color:#fff;border-color:var(--unsigned)}
  .att.on-v{background:var(--gold);color:#fff;border-color:var(--gold)}
  .attgrid{width:100%;border-collapse:collapse;font-size:13px}
  .attgrid th,.attgrid td{padding:5px 4px;text-align:center;border-bottom:1px solid var(--border)}
  .attgrid th{color:var(--muted);font-size:11.5px;font-weight:600}
  .attgrid .dnum{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
  .attgrid .mgrname{text-align:left;white-space:nowrap;font-weight:500;font-size:13px;position:sticky;left:0;background:var(--card);padding-right:10px}
  .attc{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--muted);font-weight:700;cursor:pointer;font-size:12px}
  .attc.on-p{background:var(--signed);color:#fff;border-color:var(--signed)}
  .attc.on-a{background:var(--unsigned);color:#fff;border-color:var(--unsigned)}
  .attc.on-v{background:var(--gold);color:#fff;border-color:var(--gold)}
  .attc.on-l{background:#2f6f9f;color:#fff;border-color:#2f6f9f}
  .weeknav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  @media print{.attlabel{display:inline!important;font-weight:600}}
  .embed-frame{width:100%;height:calc(100vh - 168px);min-height:560px;border:1px solid var(--border);border-radius:14px;background:#fff;display:block}
  @media(max-width:780px){.embed-frame{height:82vh;min-height:480px}}
  .acthead{font-size:15px}
  .openttl{font-weight:600;margin:8px 0 4px;color:var(--unsigned)}
  .openlist{margin:0;padding-left:22px}
  .openlist li{padding:3px 0;font-size:14px;line-height:1.45}
  .rpt{width:100%;border-collapse:collapse;font-size:14px}
  .rpt th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.3px}
  .rpt td{padding:9px 10px;border-bottom:1px solid var(--border)}
  .rpt tfoot td{border-bottom:none;padding-top:12px}
  .rptsheet{color:#000;font-family:var(--sans)}
  .rpt-h{font-family:var(--serif);font-size:21px;font-weight:800;text-align:center;letter-spacing:1px}
  .rpt-sub{text-align:center;font-weight:600;margin-top:3px}
  .rpt-meta{font-size:12.5px;color:#444;margin:8px 0 16px;text-align:center}
  .svitem{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;background:#fff;break-inside:avoid}
  .svq{font-size:15px;font-weight:500;margin-bottom:6px;line-height:1.45}
  .svnum{display:inline-block;background:var(--sidebar);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;margin-right:6px;vertical-align:middle}
  .btn.done{background:var(--signed);margin-top:10px;padding:7px 14px;font-size:13.5px}
  .rpill{display:inline-block;font-size:11.5px;font-weight:600;color:var(--unsigned);background:var(--unsignedSoft);padding:2px 8px;border-radius:7px}
  @media print{
    aside,.no-print,button,input,select,textarea,details{display:none!important}
    main{max-height:none!important;overflow:visible!important;padding:0!important}
    body{background:#fff}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:14px;page-break-inside:avoid}
    .head .bar{display:none}
    .head{margin-bottom:14px}
    .stats{gap:10px}
    table{font-size:12px}
    .pill,.rpill,.gpill{border:1px solid #ccc}
  }
  @media print{
    body.print-one aside, body.print-one main{display:none!important}
    body.print-one #printArea{display:block!important}
  }
  @media print{
    @page{size:A4;margin:16mm}
    .psheet{max-width:100%!important;width:100%!important;padding:26px 30px}
    .psheet-h{font-size:24px}
    .psheet-t{font-size:15px}
    .psheet-t td{padding:10px 8px}
    .psheet-t td.k{width:160px}
    .psheet-sign{margin-top:36px;font-size:15px}
    .rptsheet{max-width:100%!important;width:100%!important}
  }
</style>
</head>

<main id="main"></main>
<div id="printArea"></div>

<script>
/* ---------- storage (graceful: window.storage -> localStorage -> memory) ---------- */
const KEY="office-acts-tracker-v1";
let memStore={};
async function loadData(){
  try{ if(window.storage&&window.storage.get){const r=await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value);} }catch(e){}
  try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  return memStore.data||null;
}
async function saveData(d){
  memStore.data=d;
  let ok=false;
  try{ if(window.storage&&window.storage.set){await window.storage.set(KEY,JSON.stringify(d)); ok=true;} }catch(e){}
  try{ localStorage.setItem(KEY,JSON.stringify(d)); ok=true; }catch(e){}
  document.getElementById('saveState').textContent = ok? "✓ Պահված է" : "(միայն այս սեսիայում)";
}

/* ---------- state ---------- */
let data={managers:[],employees:[],acts:[],surveys:[],networks:[],tasks:[],svSeq:0,attendance:{},vacations:[],vacInfo:{}};
let tab="acts";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mName=id=>{const m=data.managers.find(x=>x.id===id);return m?m.name:"—";};
const findName=(id,arr)=>{const x=arr.find(o=>o.id===id);return x?x.name:"";};
let svForm={managerId:"",employeeId:"",question:"",signer:"Հ. Միքայելյան",date:today()};
let zSub="program";
let nwForm={partner:"",amount:"",date:today(),note:"",managerId:""};
let nwRepDate="";
let tkForm={text:"",assignee:"",deadline:"",notes:"",created:today(),files:[]};
let tkFA="all", tkFC="", tkFD="";
let editTask=null;
let tkEdit={text:"",assignee:"",deadline:"",notes:"",created:"",files:[]};
let svView="active";
let svFD="", svFM="all", svFE="all";
let vacForm={managerId:"",from:today(),to:today(),note:""};
let attWeekStart=mondayOf(today());
let attDay=today();
function getAct(mid){return data.acts.find(a=>a.managerId===mid);}
function ensureAct(mid){let a=getAct(mid);if(!a){a={id:uid(),managerId:mid,status:'unsigned',date:today(),points:[],files:[]};data.acts.push(a);}if(!a.points)a.points=[];if(!a.files)a.files=[];return a;}
function migrateActs(acts){return (acts||[]).map(a=>{if(Array.isArray(a.points)){a.files=a.files||[];return a;}const pts=[];if(a.partner||a.reason||a.issue||a.freshNum||a.freshDate){pts.push({id:uid(),name:a.partner||'',reason:a.reason||'',freshNum:a.freshNum||'',freshDate:a.freshDate||'',issue:a.issue||''});}return {id:a.id||uid(),managerId:a.managerId,status:a.status||'unsigned',date:a.date||today(),points:pts,files:a.files||[]};});}
function migrateSurveys(surveys){surveys=surveys||[];const ym={};surveys.forEach(s=>{if(s.code){const p=String(s.code).split('-');const n=parseInt(p[1],10);if(!isNaN(n))ym[p[0]]=Math.max(ym[p[0]]||0,n);}});for(let i=surveys.length-1;i>=0;i--){const s=surveys[i];if(!s.code){const y=(s.date||today()).slice(0,4);const nx=(ym[y]||0)+1;ym[y]=nx;s.code=y+'-'+String(nx).padStart(3,'0');}}}
function reportData(){
  const managers=data.managers, acts=data.acts;
  const fa=acts.filter(a=>(fManager==='all'||a.managerId===fManager)&&(fStatus==='all'||a.status===fStatus)&&(!fOpenOnly||((a.points&&a.points.length)>0)));
  const rows=managers.filter(m=>fManager==='all'||m.id===fManager).map(m=>{const a=getAct(m.id);return {name:m.name,status:a?a.status:'',open:(a&&a.points)?a.points.length:0};}).filter(r=>fStatus==='all'||r.status===fStatus).filter(r=>!fOpenOnly||r.open>0);
  return {acts:fa,rows};
}
function reportSummaryHTML(rows){

function importSpreadsheet(file){
  return new Promise((res,rej)=>{
    if(typeof XLSX==='undefined'){rej('Excel գրադարանը չի բեռնվել (ստուգեք ինտերնետը)');return;}
    const r=new FileReader();
    r.onload=()=>{try{
      const wb=XLSX.read(r.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      res(parsePeopleRows(rows));
    }catch(e){rej(e);}};
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });
}
function parsePeopleRows(rows){
  let nameCol=-1,phoneCol=-1,carCol=-1,headerIdx=-1;
  for(let i=0;i<Math.min(rows.length,6);i++){
    (rows[i]||[]).forEach((c,j)=>{const t=String(c==null?'':c).toLowerCase();
      if(nameCol<0&&/անուն|ազգ|name/.test(t))nameCol=j;
      if(phoneCol<0&&/հեռ|phone|tel/.test(t))phoneCol=j;
      if(carCol<0&&/մեքեն|car|համար/.test(t))carCol=j;});
    if(nameCol>=0){headerIdx=i;break;}
  }
  if(nameCol<0){
    const score={};
    rows.slice(0,30).forEach(r=>(r||[]).forEach((c,j)=>{const t=String(c==null?'':c);if(/[A-Za-zԱ-Ֆա-ֆ]/.test(t))score[j]=(score[j]||0)+t.length;}));
    const keys=Object.keys(score).sort((a,b)=>score[b]-score[a]);
    nameCol=keys.length?+keys[0]:0;
  }
  const out=[];let group='';
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i]||[];
    const name=String(row[nameCol]==null?'':row[nameCol]).trim();
    if(!name)continue;
    const phone=phoneCol>=0?String(row[phoneCol]==null?'':row[phoneCol]).trim():'';
    const car=carCol>=0?String(row[carCol]==null?'':row[carCol]).trim():'';
    if(!phone&&!car&&!/\s/.test(name)){group=name;continue;}
    out.push({name,phone,car,group});
  }
  return out;
}

function nextDay(d){const base=d?new Date(d):new Date();base.setDate(base.getDate()+1);return base.toISOString().slice(0,10);}

function renderZeroReport(){

  const upSum=filtered.filter(n=>n.date>tdy).reduce((s,n)=>s+(parseFloat(n.amount)||0),0);

function mondayOf(dstr){const dt=new Date(dstr+'T00:00:00');const wd=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-wd);return dt.toISOString().slice(0,10);}
function ddmm(d){const p=String(d).split('-');return p[2]+'.'+p[1];}
function ddmmy(d){const p=String(d).split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function addDays(dstr,n){const dt=new Date(dstr+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function dayName(dstr){const wd=new Date(dstr+'T00:00:00').getDay();return ['Կիր','Երկ','Երք','Չրք','Հնգ','Ուր','Շբթ'][wd];}
function attStatus(id,date){const a=data.attendance&&data.attendance[id];if(a&&a[date])return a[date];const v=(data.vacations||[]).some(x=>x.managerId===id&&x.from&&x.to&&x.from<=date&&date<=x.to);if(v)return 'vacation';return new Date(date+'T00:00:00').getDay()===0?'empty':'present';}
function attCls(st){return st==='present'?'on-p':st==='absent'?'on-a':st==='vacation'?'on-v':st==='fill'?'on-l':'';}
function attLet(st){return st==='present'?'Ն':st==='absent'?'Բ':st==='vacation'?'Ա':st==='fill'?'Լ':'';}
function printVacations(){
  const ms=data.managers, tdy=today();
  const rows=ms.map((m,i)=>{
    const vs=(data.vacations||[]).filter(v=>v.managerId===m.id).sort((a,b)=>(a.from||'').localeCompare(b.from||''));
    const info=(data.vacInfo&&data.vacInfo[m.id])||{};
    let status, range='';
    if(vs.length){status='Ֆիքսված';range=vs.map(v=>(v.from?ddmm(v.from):'—')+'–'+(v.to?ddmm(v.to):'—')).join(', ');}
    else if(info.status==='notdue')status='Չի հասնում';
    else status='Չֆիքսված';
    const note=[vs.map(v=>v.note).filter(Boolean).join('; '), info.note].filter(Boolean).join(' · ');
    return {i:i+1,name:m.name,status,range,note};
  });
  const body=rows.map(r=>`<tr><td>${r.i}</td><td>${esc(r.name)}</td><td>${r.status}</td><td>${esc(r.range)||'—'}</td><td>${esc(r.note)||'—'}</td></tr>`).join('');
  document.getElementById('printArea').innerHTML=`<div class="rptsheet"><div class="rpt-h">ԱՐՁԱԿՈՒՐԴՆԵՐԻ ՑԱՆԿ</div><div class="rpt-meta">Ամսաթիվ՝ ${ddmmy(tdy)}</div><table class="rpt"><thead><tr><th>#</th><th>Մենեջեր</th><th>Կարգավիճակ</th><th>Միջակայք</th><th>Նշում</th></tr></thead><tbody>${body}</tbody></table></div>`;
  document.body.classList.add('print-one');
  const cleanup=()=>{document.body.classList.remove('print-one');document.getElementById('printArea').innerHTML='';window.removeEventListener('afterprint',cleanup);};
  window.addEventListener('afterprint',cleanup);
  window.print();
}

function render(){
  renderNav();
  const main=document.getElementById('main');
  if(tab==="acts") main.innerHTML=renderActs();
  else if(tab==="people") main.innerHTML=renderPeople();
  else if(tab==="survey") main.innerHTML=renderSurvey();
  else if(tab==="cases") main.innerHTML=renderCases();
  else if(tab==="mgrs") main.innerHTML=renderMgrBlock();
  else if(tab==="marketing"||tab==="zeroing") main.innerHTML=renderEmbed(tab);
  else main.innerHTML=renderPlaceholder(TABS.find(t=>t.id===tab));

}

/* ---------- events ---------- */
function bind(){
  document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  document.querySelectorAll('[data-print]').forEach(b=>b.onclick=()=>{document.body.classList.remove('print-one');window.print();});
  if(tab==="marketing"||(tab==="zeroing"&&zSub==='program')){
    const host=document.getElementById('embed-host');
    if(host){
      const b64=tab==="marketing"?window.APP_MARKETING_B64:window.APP_ZEROING_B64;
      const ifr=document.createElement('iframe');
      ifr.className='embed-frame';
      ifr.srcdoc=window.IFRAME_SHIM+window.b64ToStr(b64);
      host.appendChild(ifr);
    }
  }
  document.querySelectorAll('[data-zsub]').forEach(b=>b.onclick=()=>{zSub=b.dataset.zsub;render();});
  if(tab==="zeroing"&&zSub==='networks'){
    const g=id=>document.getElementById(id);
    g('nw-partner').oninput=e=>nwForm.partner=e.target.value;
    g('nw-manager').onchange=e=>nwForm.managerId=e.target.value;
    g('nw-amount').oninput=e=>nwForm.amount=e.target.value;
    g('nw-date').onchange=e=>nwForm.date=e.target.value;
    g('nw-note').oninput=e=>nwForm.note=e.target.value;
    g('nw-add').onclick=()=>{
      if(!nwForm.partner.trim()&&!nwForm.amount){alert('Լրացրեք գործընկերը կամ գումարը');return;}
      data.networks.unshift({id:uid(),...nwForm,transferred:false});
      nwForm={partner:"",amount:"",date:today(),note:"",managerId:""};
      persist();render();
    };
    document.querySelectorAll('[data-nwtog]').forEach(b=>b.onclick=()=>{const n=data.networks.find(x=>x.id===b.dataset.nwtog);if(n){n.transferred=!n.transferred;persist();render();}});
    document.querySelectorAll('[data-nwdel]').forEach(b=>b.onclick=()=>{data.networks=data.networks.filter(x=>x.id!==b.dataset.nwdel);persist();render();});
  }
  if(tab==="zeroing"&&zSub==='report'){
    const zd=document.getElementById('zr-date'); if(zd) zd.onchange=e=>{nwRepDate=e.target.value;render();};
    const zrst=document.getElementById('zr-reset'); if(zrst) zrst.onclick=()=>{nwRepDate='';render();};
  }
  if(tab==="cases"){
    const g=id=>document.getElementById(id);
    g('tk-text').oninput=e=>tkForm.text=e.target.value;
    g('tk-assignee').onchange=e=>tkForm.assignee=e.target.value;
    g('tk-deadline').onchange=e=>tkForm.deadline=e.target.value;
    g('tk-notes').oninput=e=>tkForm.notes=e.target.value;
    g('tk-created').onchange=e=>tkForm.created=e.target.value;
    { const f=g('tk-file'); if(f) f.onchange=async e=>{const files=await readFiles(e.target.files);if(files.some(x=>x.size>MAXFILE))alert('Որոշ ֆայլեր մեծ են (>4MB) — հնարավոր է չպահվեն և հասանելի լինեն միայն այս սեսիայում։');tkForm.files=(tkForm.files||[]).concat(files);render();}; }
    document.querySelectorAll('[data-tkrmfile]').forEach(b=>b.onclick=()=>{tkForm.files.splice(+b.dataset.tkrmfile,1);render();});
    g('tk-add').onclick=()=>{
      if(!tkForm.text.trim()){alert('Գրեք գործը');return;}
      data.tasks.unshift({id:uid(),...tkForm,created:tkForm.created||today(),done:false});
      tkForm={text:"",assignee:"",deadline:"",notes:"",created:today(),files:[]};
      persist();render();
    };
    const tfa=g('tkf-assignee'); if(tfa) tfa.onchange=e=>{tkFA=e.target.value;render();};
    const tfc=g('tkf-created'); if(tfc) tfc.onchange=e=>{tkFC=e.target.value;render();};
    const tfd=g('tkf-deadline'); if(tfd) tfd.onchange=e=>{tkFD=e.target.value;render();};
    const tfr=g('tkf-reset'); if(tfr) tfr.onclick=()=>{tkFA='all';tkFC='';tkFD='';render();};
    document.querySelectorAll('[data-tktog]').forEach(b=>b.onclick=()=>{const t=data.tasks.find(x=>x.id===b.dataset.tktog);if(t){t.done=!t.done;persist();render();}});
    document.querySelectorAll('[data-tkdel]').forEach(b=>b.onclick=()=>{data.tasks=data.tasks.filter(x=>x.id!==b.dataset.tkdel);persist();render();});
    document.querySelectorAll('[data-tknext]').forEach(b=>b.onclick=()=>{const t=data.tasks.find(x=>x.id===b.dataset.tknext);if(t){t.deadline=nextDay(t.deadline);persist();render();}});
    document.querySelectorAll('[data-tkedit]').forEach(b=>b.onclick=()=>{const t=data.tasks.find(x=>x.id===b.dataset.tkedit);if(t){editTask=t.id;tkEdit={text:t.text||'',assignee:t.assignee||'',deadline:t.deadline||'',notes:t.notes||'',created:t.created||'',files:t.files?[...t.files]:[]};render();}});
    const teS=g('te-save'); if(teS) teS.onclick=()=>{const t=data.tasks.find(x=>x.id===editTask);if(t){t.text=(g('te-text').value||'').trim()||t.text;t.assignee=g('te-assignee').value;t.deadline=g('te-deadline').value;t.created=g('te-created').value||t.created;t.notes=(g('te-notes').value||'').trim();t.files=tkEdit.files;}editTask=null;persist();render();};
    const teC=g('te-cancel'); if(teC) teC.onclick=()=>{editTask=null;render();};
    { const f=g('te-file'); if(f) f.onchange=async e=>{const files=await readFiles(e.target.files);if(files.some(x=>x.size>MAXFILE))alert('Որոշ ֆայլեր մեծ են (>4MB)');tkEdit.files=(tkEdit.files||[]).concat(files);render();}; }
    document.querySelectorAll('[data-termfile]').forEach(b=>b.onclick=()=>{tkEdit.files.splice(+b.dataset.termfile,1);render();});
    document.querySelectorAll('[data-tkopen]').forEach(b=>b.onclick=()=>{const[id,idx]=b.dataset.tkopen.split('|');const t=data.tasks.find(x=>x.id===id);if(t&&t.files&&t.files[idx])openFile(t.files[idx]);});
  }

  if(tab==="mgrs"){
    const g=id=>document.getElementById(id);
    document.querySelectorAll('[data-attset]').forEach(b=>b.onclick=()=>{const[id,d]=b.dataset.attset.split('|');const order=['empty','fill','present','absent','vacation'];const cur=attStatus(id,d);let ix=order.indexOf(cur);if(ix<0)ix=0;const nx=order[(ix+1)%order.length];data.attendance=data.attendance||{};data.attendance[id]=data.attendance[id]||{};data.attendance[id][d]=nx;persist();render();});
    const wp=g('wk-prev'); if(wp) wp.onclick=()=>{attWeekStart=addDays(attWeekStart,-7);render();};
    const wn=g('wk-next'); if(wn) wn.onclick=()=>{attWeekStart=addDays(attWeekStart,7);render();};
    const wt=g('wk-today'); if(wt) wt.onclick=()=>{attWeekStart=mondayOf(today());render();};
    const ws=g('wk-start'); if(ws) ws.onchange=e=>{if(e.target.value){attWeekStart=e.target.value;render();}};
    const ad=g('att-day'); if(ad) ad.onchange=e=>{attDay=e.target.value;render();};
    const vm=g('vac-mgr'); if(vm) vm.onchange=e=>vacForm.managerId=e.target.value;
    const vf=g('vac-from'); if(vf) vf.onchange=e=>vacForm.from=e.target.value;
    const vt=g('vac-to'); if(vt) vt.onchange=e=>vacForm.to=e.target.value;
    const vn=g('vac-note'); if(vn) vn.oninput=e=>vacForm.note=e.target.value;
    const va=g('vac-add'); if(va) va.onclick=()=>{
      if(!vacForm.managerId){alert('Ընտրեք մենեջեր');return;}
      data.vacations=data.vacations||[];
      data.vacations.push({id:uid(),...vacForm});
      vacForm={managerId:"",from:today(),to:today(),note:""};
      persist();render();
    };
    document.querySelectorAll('[data-vacdel]').forEach(b=>b.onclick=()=>{data.vacations=data.vacations.filter(v=>v.id!==b.dataset.vacdel);persist();render();});
    document.querySelectorAll('[data-vacstat]').forEach(b=>b.onclick=()=>{const[id,st]=b.dataset.vacstat.split('|');data.vacInfo=data.vacInfo||{};data.vacInfo[id]=data.vacInfo[id]||{};data.vacInfo[id].status=(st==='notfixed'?'':st);persist();render();});
    document.querySelectorAll('[data-vacnote]').forEach(inp=>inp.onchange=()=>{const id=inp.dataset.vacnote;data.vacInfo=data.vacInfo||{};data.vacInfo[id]=data.vacInfo[id]||{};data.vacInfo[id].note=inp.value;persist();});
    const vp=g('vac-print'); if(vp) vp.onclick=()=>printVacations();
  }

  if(tab==="acts"){
    const g=id=>document.getElementById(id);
    const mSel=g('ac-manager'); if(mSel) mSel.onchange=e=>{selManager=e.target.value;editMgr=false;render();};
    const maBtn=g('mgr-add-btn'); if(maBtn) maBtn.onclick=()=>{const inp=g('mgr-add');const v=(inp.value||'').trim();if(!v)return;const id=uid();data.managers.push({id,name:v,phone:'',car:'',group:''});selManager=id;editMgr=false;persist();render();};
    const maInp=g('mgr-add'); if(maInp) maInp.onkeydown=e=>{if(e.key==='Enter'){const v=(maInp.value||'').trim();if(v){const id=uid();data.managers.push({id,name:v,phone:'',car:'',group:''});selManager=id;editMgr=false;persist();render();}}};
    const meEdit=g('me-edit'); if(meEdit) meEdit.onclick=()=>{const m=data.managers.find(x=>x.id===selManager);if(m){mgrForm={name:m.name||'',phone:m.phone||'',car:m.car||''};editMgr=true;render();}};
    const meSave=g('me-save'); if(meSave) meSave.onclick=()=>{const m=data.managers.find(x=>x.id===selManager);if(m){const nm=(g('me-name').value||'').trim();if(nm)m.name=nm;m.phone=(g('me-phone').value||'').trim();m.car=(g('me-car').value||'').trim();}editMgr=false;persist();render();};
    const meCancel=g('me-cancel'); if(meCancel) meCancel.onclick=()=>{editMgr=false;render();};
    const meDel=g('me-del'); if(meDel) meDel.onclick=()=>{if(!confirm('Ջնջե՞լ մենեջերին և իր ակտը։'))return;data.managers=data.managers.filter(x=>x.id!==selManager);data.acts=data.acts.filter(a=>a.managerId!==selManager);selManager='';editMgr=false;persist();render();};
    if(selManager){
      const su=g('ac-unsigned'), ss=g('ac-signed'), ad=g('ac-date');
      if(su) su.onclick=()=>{ensureAct(selManager).status='unsigned';persist();render();};
      if(ss) ss.onclick=()=>{ensureAct(selManager).status='signed';persist();render();};
      if(ad) ad.onchange=e=>{ensureAct(selManager).date=e.target.value;persist();};
      g('pt-name').oninput=e=>ptForm.name=e.target.value;
      g('pt-reason').onchange=e=>ptForm.reason=e.target.value;
      g('pt-freshnum').oninput=e=>ptForm.freshNum=e.target.value;
      g('pt-freshdate').onchange=e=>ptForm.freshDate=e.target.value;
      g('pt-issue').oninput=e=>ptForm.issue=e.target.value;
      g('pt-add').onclick=()=>{
        if(!ptForm.name.trim()&&!ptForm.reason){alert('Լրացրեք վաճառակետը կամ պատճառը');return;}
        const a=ensureAct(selManager); a.points.push({id:uid(),...ptForm});
        ptForm={name:"",reason:"",freshNum:"",freshDate:"",issue:""};
        persist();render();
      };
      const af=g('ac-file'); if(af) af.onchange=async e=>{
        const files=await readFiles(e.target.files);
        if(files.some(f=>f.size>MAXFILE)) alert('Որոշ ֆայլեր մեծ են (>4MB) — հնարավոր է չպահվեն և հասանելի լինեն միայն այս սեսիայում։');
        const a=ensureAct(selManager); a.files=(a.files||[]).concat(files); persist();render();
      };
      document.querySelectorAll('[data-rmpt]').forEach(b=>b.onclick=()=>{const a=getAct(selManager);if(a){a.points=a.points.filter(p=>p.id!==b.dataset.rmpt);persist();render();}});
      document.querySelectorAll('[data-rmacfile]').forEach(b=>b.onclick=()=>{const a=getAct(selManager);if(a&&a.files){a.files.splice(+b.dataset.rmacfile,1);persist();render();}});
      const rm=g('ac-remove'); if(rm) rm.onclick=()=>{if(!confirm('Ջնջե՞լ այս մենեջերի ակտը ամբողջությամբ։'))return;data.acts=data.acts.filter(a=>a.managerId!==selManager);persist();render();};
    }
    const fm=g('filt-manager'); if(fm) fm.onchange=e=>{fManager=e.target.value;render();};
    const fs=g('filt-status'); if(fs) fs.onchange=e=>{fStatus=e.target.value;render();};
    const fo=g('filt-open'); if(fo) fo.onclick=()=>{fOpenOnly=!fOpenOnly;render();};
    const rt=g('rpt-type'); if(rt) rt.onchange=e=>{reportType=e.target.value;render();};
    const rp=g('rpt-print'); if(rp) rp.onclick=()=>printReport();
    document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{const[aid,idx]=b.dataset.open.split('|');const act=data.acts.find(a=>a.id===aid);if(act&&act.files&&act.files[idx])openFile(act.files[idx]);});
  }

  if(tab==="survey"){
    const g=id=>document.getElementById(id);
    g('sv-manager').onchange=e=>svForm.managerId=e.target.value;
    g('sv-employee').onchange=e=>svForm.employeeId=e.target.value;
    g('sv-question').oninput=e=>svForm.question=e.target.value;
    g('sv-signer').oninput=e=>svForm.signer=e.target.value;
    g('sv-date').onchange=e=>svForm.date=e.target.value;
    g('sv-add').onclick=()=>{
      if(!svForm.question.trim()){alert('Գրեք հարցի բովանդակությունը');return;}
      if(!svForm.managerId&&!svForm.employeeId){alert('Ընտրեք մենեջեր կամ աշխատակից');return;}
      { const y=(svForm.date||today()).slice(0,4); const nx=(data.surveys.filter(s=>s.code&&String(s.code).indexOf(y+'-')===0).reduce((m,s)=>{const n=parseInt(String(s.code).split('-')[1],10);return isNaN(n)?m:Math.max(m,n);},0))+1; const code=y+'-'+String(nx).padStart(3,'0'); data.surveys.unshift({id:uid(),...svForm,archived:false,code:code}); }
      svForm={managerId:"",employeeId:"",question:"",signer:svForm.signer,date:today()};
      persist();render();
    };
    document.querySelectorAll('[data-svview]').forEach(b=>b.onclick=()=>{svView=b.dataset.svview;render();});
    const sfd=g('svf-date'); if(sfd) sfd.onchange=e=>{svFD=e.target.value;render();};
    const sfm=g('svf-manager'); if(sfm) sfm.onchange=e=>{svFM=e.target.value;render();};
    const sfe=g('svf-emp'); if(sfe) sfe.onchange=e=>{svFE=e.target.value;render();};
    const sfr=g('svf-reset'); if(sfr) sfr.onclick=()=>{svFD='';svFM='all';svFE='all';render();};
    document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>{const s=data.surveys.find(x=>x.id===b.dataset.done);if(s){s.archived=true;s.doneDate=today();persist();render();}});
    document.querySelectorAll('[data-svrestore]').forEach(b=>b.onclick=()=>{const s=data.surveys.find(x=>x.id===b.dataset.svrestore);if(s){s.archived=false;persist();render();}});
    document.querySelectorAll('[data-svdel]').forEach(b=>b.onclick=()=>{if(!confirm('Վերջնակա՞ն ջնջել հարցաթերթիկը։'))return;data.surveys=data.surveys.filter(x=>x.id!==b.dataset.svdel);persist();render();});
    document.querySelectorAll('[data-printsv]').forEach(b=>b.onclick=()=>printSurvey(b.dataset.printsv));
  }

  if(tab==="people"){
    document.querySelectorAll('[data-addone]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.addone, inp=document.getElementById('add-'+k), v=inp.value.trim();
      if(!v)return; data[k].push({id:uid(),name:v}); persist();render();
    });
    document.querySelectorAll('[data-addbulk]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.addbulk, ta=document.getElementById('bulk-'+k);
      const names=ta.value.split('\n').map(s=>s.trim()).filter(Boolean).map(n=>({id:uid(),name:n}));
      if(names.length){data[k].push(...names);persist();render();}
    });
    document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=()=>{
      const [k,id]=b.dataset.delp.split(':'); data[k]=data[k].filter(i=>i.id!==id); persist();render();
    });
    // Import from Excel/CSV
    document.querySelectorAll('[data-import]').forEach(b=>b.onclick=()=>{const k=b.dataset.import;document.getElementById('imp-'+k).click();});
    ['managers','employees'].forEach(k=>{const inp=document.getElementById('imp-'+k);if(inp)inp.onchange=async e=>{
      const f=e.target.files[0]; if(!f)return;
      try{
        const ppl=await importSpreadsheet(f);
        if(!ppl.length){alert('Ֆայլում անուններ չգտնվեցին։');return;}
        const have=new Set(data[k].map(x=>x.name));
        const added=ppl.filter(p=>!have.has(p.name)).map(p=>({id:uid(),...p}));
        data[k].push(...added); persist(); render();
        const dup=ppl.length-added.length;
        alert('Ավելացվեց '+added.length+' անուն'+(dup?(' (արդեն կար '+dup+')'):'')+'։');
      }catch(err){alert('Չհաջողվեց կարդալ ֆայլը։ '+err);}
      e.target.value='';
    };});
    // Enter to add
    ['managers','employees'].forEach(k=>{const i=document.getElementById('add-'+k); if(i) i.onkeydown=e=>{if(e.key==='Enter'){const v=i.value.trim();if(v){data[k].push({id:uid(),name:v});persist();render();}}};});
  }
}

/* ---------- init ---------- */
(async()=>{
  const saved=await loadData();
  if(saved){ data={managers:saved.managers||[],employees:saved.employees||[],acts:migrateActs(saved.acts),surveys:saved.surveys||[],networks:saved.networks||[],tasks:saved.tasks||[],svSeq:saved.svSeq||0,attendance:saved.attendance||{},vacations:saved.vacations||[],vacInfo:saved.vacInfo||{}}; }
  else { data={managers:SEED_MANAGERS.map(p=>({id:uid(),...p})),employees:[],acts:[],surveys:[],networks:[],tasks:[],svSeq:0,attendance:{},vacations:[],vacInfo:{}}; await persist(); }
  migrateSurveys(data.surveys);
  document.getElementById('saveState').textContent="";
  render();
})();
</script>
</body>
</html>
